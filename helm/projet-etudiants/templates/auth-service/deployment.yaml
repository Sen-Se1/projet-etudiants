apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: {{ .Values.replicaCount.authService }}
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: "{{ .Values.images.authService.repository }}:{{ .Values.images.authService.tag }}"
          ports:
            - containerPort: 3001
          env:
            - name: MONGO_URI
              value: mongodb://mongodb:27017/authdb

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET