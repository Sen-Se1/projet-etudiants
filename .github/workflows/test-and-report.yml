name: Test and Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: |
          # Detect all Maven modules and run tests
          for pom in $(find . -name "pom.xml" -not -path "*/target/*"); do
            dir=$(dirname $pom)
            echo "-------------------------------------------------------"
            echo "Processing module: $dir"
            echo "-------------------------------------------------------"
            (
              cd "$dir"
              if [ -f "./mvnw" ]; then
                chmod +x mvnw
                ./mvnw verify -DskipTests=false
              else
                mvn verify -DskipTests=false
              fi
            )
          done

      - name: Publish results to Xray
        if: always()
        env:
          XRAY_TOKEN: ${{ secrets.XRAY_TOKEN }}
        run: |
          # Collect all JUnit XML reports
          REPORTS=$(find . -type f -path "*/target/surefire-reports/TEST-*.xml")
          
          if [ -n "$REPORTS" ]; then
            echo "Found test reports. Preparing for upload..."
            
            # Zip reports to handle multiple files easily
            zip -j test-reports.zip $REPORTS
            
            # Upload to Xray
            # Note: We fix the broken multi-line URL from the original version
            curl -H "Content-Type: multipart/form-data" \
                 -H "Authorization: Bearer $XRAY_TOKEN" \
                 -F "file=@test-reports.zip" \
                 "https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=PROJ"
          else
            echo "No test reports found."
          fi